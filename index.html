<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レシート写真読み込み</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 20px; }
    /* ファイル選択ボタンを大きく見やすく装飾 */
    .upload-btn {
      display: inline-block; padding: 15px 30px; font-size: 1.2rem;
      background: #007bff; color: white; border-radius: 5px; cursor: pointer;
    }
    input[type="file"] { display: none; }
    #preview { width: 100%; max-width: 400px; margin-top: 20px; display: none; }
  </style>
</head>
<body>

  <h1>レシートを撮影</h1>
  
  <!-- スマホのカメラを直接起動する魔法のボタン -->
  <label class="upload-btn">
    ここを押してレシートを撮影
    <input type="file" id="camera-input" accept="image/*" capture="environment">
  </label>

  <br>
  <!-- 撮影したレシートのプレビュー表示 -->
  <img id="preview" alt="レシートのプレビュー">

  <script>
    const cameraInput = document.getElementById('camera-input');
    const preview = document.getElementById('preview');

    cameraInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      // 撮った写真を画面に表示する処理
      const reader = new FileReader();
      reader.onload = (event) => {
        preview.src = event.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
